<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <style>
    body {
      background: #f7f7f7;
      font-family: 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .rank-container {
      width: 480px;
      margin: 32px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px 24px 24px 24px;
    }
    .rank-title {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      text-align: center;
      margin-bottom: 24px;
    }
    .rank-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .rank-item {
      display: flex;
      align-items: center;
      font-size: 20px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .rank-index {
      width: 36px;
      text-align: right;
      color: #888;
      font-weight: bold;
      margin-right: 12px;
    }
    .rank-nickname {
      flex: 1;
      color: #222;
      font-weight: 500;
    }
    .rank-userid {
      color: #aaa;
      font-size: 14px;
      margin-left: 8px;
    }
    .rank-count {
      color: #d19f56;
      font-weight: bold;
      margin-left: 16px;
      font-size: 18px;
    }
    .rank-footer {
      margin-top: 16px;
      padding-top: 8px;
      border-top: 1px solid #e4e9f0;
      color: #a0aec0;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.2px;
      background: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="rank-container">
    <div class="rank-title">{{ title }}</div>
    {{#if list.length}}
    <ul class="rank-list">
      {{#each list}}
      <li class="rank-item">
        <span class="rank-index">{{ addOne @index }}</span>
        <span class="rank-nickname">{{ nickname }}</span>
        <span class="rank-userid">({{ userId }})</span>
        <span class="rank-count">{{ count }}次</span>
      </li>
      {{/each}}
    </ul>
    {{else}}
    <div style="text-align:center;color:#bbb;font-size:20px;padding:32px 0;">暂无数据~</div>
    {{/if}}
    <div class="rank-footer">
      <span>生成时间：{{ generateTime }} | Poke-plugin v{{ version }}</span>
    </div>
  </div>
</body>
</html>
